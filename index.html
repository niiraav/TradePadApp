<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FFFFFF" id="theme-color-meta" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="manifest" href="/manifest.json?v=2" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png?v=2" />
    <title>TradePad</title>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem("tradepad_dark_mode");
          var isDark = stored !== null ? stored === "true" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (isDark) document.documentElement.classList.add("dark");
          // Prevent white flash: set body background immediately before any rendering
          document.documentElement.style.backgroundColor = isDark ? "#111827" : "#FFFFFF";
          document.body = document.body || {};
          var meta = document.getElementById("theme-color-meta");
          if (meta) meta.setAttribute("content", isDark ? "#111827" : "#FFFFFF");
        } catch (e) {}
      })();
    </script>
    <style>
      /* Prevent flash of unstyled content before CSS loads */
      html, body { background-color: #FFFFFF; }
      html.dark, html.dark body { background-color: #111827; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx?v=2"></script>
  </body>
</html>
